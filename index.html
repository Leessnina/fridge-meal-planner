<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🥘 食材盘点器 — 今晚吃什么？</title>
<style>
/* ========== CSS Variables & Reset ========== */
:root {
  --bg:        #FFF9F2;
  --card:      #FFFFFF;
  --orange:    #E8783B;
  --orange-lt: #FFF0E8;
  --orange-dk: #C45D2A;
  --brown:     #4A3728;
  --brown-lt:  #8B7355;
  --green:     #5B9A5F;
  --green-lt:  #EDF7EE;
  --red:       #D94A4A;
  --red-lt:    #FFF0F0;
  --blue:      #4A90D9;
  --blue-lt:   #EDF4FC;
  --gray:      #E8E3DD;
  --gray-dk:   #B0A89F;
  --text:      #3D2E24;
  --text-lt:   #8B8076;
  --radius:    12px;
  --shadow:    0 2px 12px rgba(74,55,40,0.06);
  --shadow-lg: 0 8px 32px rgba(74,55,40,0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-tap-highlight-color: transparent;
  min-height: 100vh;
}
button { font-family: inherit; cursor: pointer; border: none; outline: none; }
input, textarea, select { font-family: inherit; outline: none; }

/* ========== Layout ========== */
.container { max-width: 520px; margin: 0 auto; padding: 16px 16px 120px; }

/* ========== Header ========== */
.header {
  text-align: center;
  padding: 24px 0 8px;
}
.header .emoji { font-size: 48px; display: block; margin-bottom: 4px; }
.header h1 {
  font-size: 26px;
  font-weight: 800;
  color: var(--brown);
  letter-spacing: 1px;
}
.header .subtitle {
  font-size: 13px;
  color: var(--text-lt);
  margin-top: 2px;
}

/* ========== Section Cards ========== */
.section {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px 18px;
  margin-bottom: 14px;
  transition: all 0.35s ease;
}
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  user-select: none;
}
.section-header.clickable { cursor: pointer; }
.section-header h2 {
  font-size: 16px;
  font-weight: 700;
  color: var(--brown);
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-header .arrow {
  font-size: 12px;
  color: var(--gray-dk);
  transition: transform 0.25s;
}
.section-header.collapsed .arrow { transform: rotate(-90deg); }
.section-body { overflow: hidden; transition: max-height 0.35s ease, opacity 0.25s; }
.section-body.hidden { max-height: 0 !important; opacity: 0; }

/* ========== Filter Collapse Wrapper ========== */
.filter-area { transition: all 0.35s ease; }
.filter-collapse-bar {
  display: none;
  background: var(--orange-lt);
  border: 1.5px dashed var(--orange);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 14px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--orange-dk);
  cursor: pointer;
  transition: all 0.2s;
}
.filter-collapse-bar:hover { background: #FFE4D0; }
.filter-collapse-bar .summary { font-weight: 400; color: var(--brown-lt); }

/* Floating expand button */
.fab-filter {
  display: none;
  position: fixed;
  bottom: 100px;
  right: 16px;
  z-index: 101;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--orange);
  color: #fff;
  font-size: 20px;
  box-shadow: 0 4px 16px rgba(232,120,59,0.4);
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.fab-filter.show { display: flex; }
.fab-filter:active { transform: scale(0.92); }

/* ========== Condiment Grid ========== */
.condiment-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.condiment-item {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 7px 8px;
  border-radius: 8px;
  background: var(--bg);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.18s;
  border: 1.5px solid transparent;
}
.condiment-item:hover { border-color: var(--orange); }
.condiment-item.checked {
  background: var(--orange-lt);
  border-color: var(--orange);
  color: var(--orange-dk);
  font-weight: 600;
}
.condiment-item input { display: none; }
.condiment-item .dot {
  width: 16px; height: 16px;
  border-radius: 4px;
  border: 1.5px solid var(--gray-dk);
  background: #fff;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  transition: all 0.18s;
}
.condiment-item.checked .dot {
  background: var(--orange);
  border-color: var(--orange);
}

/* ========== Ingredient Categories ========== */
.cat-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--brown-lt);
  margin: 10px 0 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.cat-label:first-child { margin-top: 0; }
.ingredient-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 7px;
}
.ingredient-item {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 8px 10px;
  border-radius: 8px;
  background: var(--bg);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.18s;
  border: 1.5px solid transparent;
  position: relative;
}
.ingredient-item:hover { border-color: var(--orange); }
.ingredient-item.checked {
  background: var(--orange-lt);
  border-color: var(--orange);
  color: var(--orange-dk);
  font-weight: 600;
}
.ingredient-item input { display: none; }
.ingredient-item .dot {
  width: 16px; height: 16px;
  border-radius: 4px;
  border: 1.5px solid var(--gray-dk);
  background: #fff;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  transition: all 0.18s;
}
.ingredient-item.checked .dot {
  background: var(--orange);
  border-color: var(--orange);
}

/* Delete button on custom ingredients */
.ingredient-item .del-btn {
  display: none;
  margin-left: auto;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--red);
  color: #fff;
  font-size: 11px;
  line-height: 18px;
  text-align: center;
  cursor: pointer;
}
.ingredient-item.custom:hover .del-btn { display: block; }

/* ========== Custom Ingredient Input ========== */
.custom-ing-area {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--gray);
  display: flex;
  gap: 7px;
}
.custom-ing-area input {
  flex: 1;
  border: 1.5px solid var(--gray);
  border-radius: 8px;
  padding: 7px 10px;
  font-size: 13px;
  background: var(--bg);
}
.custom-ing-area input:focus { border-color: var(--orange); }
.custom-ing-area button {
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  background: var(--orange);
  color: #fff;
  white-space: nowrap;
  transition: all 0.15s;
}
.custom-ing-area button:active { transform: scale(0.95); }

/* ========== Selected Ingredient State Panel ========== */
.state-panel { display: none; }
.state-panel.active { display: block; }
.state-item {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
  background: var(--bg);
  border-radius: 10px;
  border: 1px solid var(--gray);
}
.state-item .ing-name {
  font-weight: 700;
  font-size: 14px;
  min-width: 50px;
  color: var(--brown);
}
.state-item .state-group {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}
.state-item .state-label {
  font-size: 11px;
  color: var(--text-lt);
  margin-right: 2px;
  white-space: nowrap;
}
.tag-btn {
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 12px;
  background: #fff;
  color: var(--text-lt);
  border: 1px solid var(--gray);
  transition: all 0.15s;
  white-space: nowrap;
}
.tag-btn:hover { border-color: var(--orange); color: var(--orange); }
.tag-btn.active {
  background: var(--orange);
  color: #fff;
  border-color: var(--orange);
  font-weight: 600;
}
.tag-btn.wilted.active {
  background: var(--red);
  border-color: var(--red);
}
.tag-btn.frozen.active {
  background: var(--blue);
  border-color: var(--blue);
}

/* ========== Restrictions ========== */
.restrict-input-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.restrict-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 12px;
  background: var(--red-lt);
  color: var(--red);
  font-weight: 600;
}
.restrict-tag .x {
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  opacity: 0.6;
}
.restrict-tag .x:hover { opacity: 1; }
#restrict-input {
  flex: 1;
  min-width: 100px;
  border: 1.5px solid var(--gray);
  border-radius: 8px;
  padding: 7px 10px;
  font-size: 13px;
  background: var(--bg);
}
#restrict-input:focus { border-color: var(--orange); }
.quick-restrict {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.quick-restrict .tag-btn { font-size: 11px; padding: 3px 9px; }

/* ========== Main CTA ========== */
.cta-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 16px 20px;
  background: linear-gradient(transparent, var(--bg) 40%);
  z-index: 100;
  display: flex;
  justify-content: center;
}
.cta-btn {
  width: 100%;
  max-width: 488px;
  padding: 14px;
  font-size: 17px;
  font-weight: 700;
  border-radius: 28px;
  background: linear-gradient(135deg, var(--orange), #F0965C);
  color: #fff;
  box-shadow: 0 4px 20px rgba(232,120,59,0.35);
  transition: all 0.2s;
  letter-spacing: 1px;
}
.cta-btn:active { transform: scale(0.97); opacity: 0.9; }
.cta-btn:disabled {
  background: var(--gray);
  box-shadow: none;
  color: var(--gray-dk);
}

/* ========== Results ========== */
.results-area { margin-top: 6px; }
.results-header {
  text-align: center;
  margin-bottom: 12px;
  font-size: 14px;
  color: var(--text-lt);
}
.results-header strong { color: var(--orange); font-size: 18px; }
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-lt);
}
.empty-state .big-emoji { font-size: 64px; display: block; margin-bottom: 12px; }
.recipe-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 14px;
  border-left: 4px solid var(--orange);
  transition: all 0.2s;
}
.recipe-card.top-pick { border-left-color: var(--red); box-shadow: var(--shadow-lg); }
.recipe-card .card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 6px;
}
.recipe-card .card-header h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--brown);
}
.recipe-card .badges {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.badge {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.badge-time   { background: var(--orange-lt); color: var(--orange-dk); }
.badge-diff-1 { background: var(--green-lt); color: var(--green); }
.badge-diff-2 { background: #FFF8E1; color: #E6A817; }
.badge-diff-3 { background: var(--red-lt); color: var(--red); }
.badge-wilted { background: var(--red-lt); color: var(--red); animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* Match percentage badge */
.match-pct {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.5px;
}
.match-pct.high { background: #D4EDDA; color: #2D6A3F; }
.match-pct.mid  { background: #FFF3CD; color: #B8860B; }
.match-pct.low  { background: #FCE4E4; color: #C0392B; }

/* Missing summary box */
.missing-summary {
  background: #FFFBF5;
  border: 1px solid #F0E4D0;
  border-radius: 8px;
  padding: 8px 12px;
  margin-top: 8px;
  font-size: 12px;
  line-height: 1.7;
}
.missing-summary .ms-title {
  font-weight: 700;
  color: var(--brown);
  margin-bottom: 2px;
}
.missing-summary .ms-row {
  color: var(--text-lt);
}

.recipe-card .tags-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}
.tag-sm {
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  background: var(--bg);
  color: var(--brown-lt);
}
.tag-sm.match  { background: var(--green-lt); color: var(--green); font-weight: 600; }
.tag-sm.miss   { background: var(--red-lt);  color: var(--red);  font-weight: 600; }
.tag-sm.sub-ok { background: #FFF8E1; color: #C8960E; font-weight: 600; }

.recipe-card .steps-list {
  margin: 8px 0 0;
  padding: 0;
  list-style: none;
}
.recipe-card .steps-list li {
  font-size: 12px;
  color: var(--text-lt);
  padding: 3px 0 3px 18px;
  position: relative;
}
.recipe-card .steps-list li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 10px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--orange);
  opacity: 0.5;
}

.search-links {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.search-link {
  flex: 1;
  min-width: 100px;
  text-align: center;
  padding: 8px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.18s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.search-link.xhs { background: #FFF0E8; color: #E8783B; border: 1px solid #FAD5C0; }
.search-link.bili { background: #FDE8F0; color: #E85B81; border: 1px solid #FAC0D3; }
.search-link:hover { transform: translateY(-1px); }

/* ========== Tip Box ========== */
.tip-box {
  background: var(--orange-lt);
  border-radius: 8px;
  padding: 8px 12px;
  margin-top: 8px;
  font-size: 12px;
  color: var(--orange-dk);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ========== Recipe Editor ========== */
.recipe-editor { display: none; margin-top: 14px; }
.recipe-editor.active { display: block; }
.editor-row {
  margin-bottom: 10px;
}
.editor-row label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--brown-lt);
  margin-bottom: 4px;
}
.editor-row input, .editor-row textarea {
  width: 100%;
  border: 1.5px solid var(--gray);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 13px;
  background: var(--bg);
}
.editor-row input:focus, .editor-row textarea:focus { border-color: var(--orange); }
.editor-row textarea { min-height: 80px; resize: vertical; }
.editor-ing-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
  max-height: 160px;
  overflow-y: auto;
  padding: 4px;
  background: var(--bg);
  border-radius: 8px;
}
.editor-ing-grid label {
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 4px 6px;
  border-radius: 6px;
  cursor: pointer;
}
.editor-ing-grid label:hover { background: #fff; }
.editor-ing-grid input[type="checkbox"] { width: auto; }
.diff-picker { display: flex; gap: 6px; }
.diff-picker .tag-btn { font-size: 13px; padding: 6px 14px; }
.editor-actions { display: flex; gap: 8px; margin-top: 12px; }
.editor-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 700;
}
.btn-primary { background: var(--orange); color: #fff; }
.btn-outline { background: #fff; color: var(--orange); border: 1.5px solid var(--orange); }
.btn-danger  { background: #fff; color: var(--red); border: 1.5px solid var(--red); }
.custom-recipe-list { margin-top: 12px; }
.custom-recipe-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  margin-bottom: 5px;
  background: var(--bg);
  border-radius: 8px;
  font-size: 13px;
}
.custom-recipe-item .cr-name { font-weight: 600; color: var(--brown); }
.custom-recipe-item .cr-meta { font-size: 11px; color: var(--text-lt); }
.custom-recipe-item .cr-del {
  color: var(--red);
  cursor: pointer;
  font-size: 16px;
  padding: 0 4px;
}

/* ========== Responsive ========== */
@media (min-width: 520px) {
  .container { padding: 20px 0 120px; }
  .condiment-grid { grid-template-columns: repeat(5, 1fr); }
  .ingredient-grid { grid-template-columns: repeat(4, 1fr); }
  .editor-ing-grid { grid-template-columns: repeat(5, 1fr); }
}
@media (max-width: 360px) {
  .condiment-grid { grid-template-columns: repeat(3, 1fr); }
  .ingredient-grid { grid-template-columns: repeat(2, 1fr); }
  .editor-ing-grid { grid-template-columns: repeat(3, 1fr); }
  .state-item { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="container">

  <!-- ===== Header ===== -->
  <div class="header">
    <span class="emoji">🥘</span>
    <h1>食材盘点器</h1>
    <p class="subtitle">打开冰箱，3秒决定今晚吃什么</p>
  </div>

  <!-- ===== 筛选区域（可折叠） ===== -->
  <div class="filter-area" id="filter-area">

    <!-- 筛选折叠条 -->
    <div class="filter-collapse-bar" id="filter-collapse-bar" onclick="expandFilters()">
      📋 <span id="collapse-summary"></span> — <span style="text-decoration:underline;">点击展开调整</span> ▼
    </div>

    <!-- ===== 调料库存 ===== -->
    <div class="section" id="condiment-section">
      <div class="section-header clickable" id="condiment-toggle">
        <h2><span>🧂</span> 家中调料库存</h2>
        <span class="arrow">▼</span>
      </div>
      <div class="section-body" id="condiment-body">
        <p style="font-size:11px;color:var(--text-lt);margin-bottom:8px;">勾选家中现有的，设置一次自动记住（下次打开还在）</p>
        <div class="condiment-grid" id="condiment-grid"></div>
      </div>
    </div>

    <!-- ===== 食材选择区 ===== -->
    <div class="section" id="ingredient-section">
      <div class="section-header clickable" id="ingredient-toggle">
        <h2><span>🥬</span> 冰箱食材盘点</h2>
        <span style="font-size:11px;color:var(--text-lt);" id="ing-count">已选 0 种</span>
      </div>
      <div class="section-body" id="ingredient-body">
        <div id="ingredient-area"></div>

        <!-- 已选食材状态 -->
        <div class="state-panel" id="state-panel">
          <div style="font-size:13px;font-weight:700;color:var(--brown);margin-bottom:8px;">
            📋 食材状态设定 <span style="font-weight:400;font-size:11px;color:var(--text-lt);">（调整剩余量与赏味期）</span>
          </div>
          <div id="state-list"></div>
        </div>

        <!-- 自定义食材输入 -->
        <div class="custom-ing-area">
          <input type="text" id="custom-ing-input" placeholder="+ 添加自定义食材（如腊肠、芝士）" maxlength="20">
          <button onclick="addCustomIngredient()">添加</button>
        </div>
      </div>
    </div>

    <!-- ===== 忌口过滤 ===== -->
    <div class="section" id="restrict-section">
      <div class="section-header clickable" id="restrict-toggle">
        <h2><span>🚫</span> 忌口食材</h2>
      </div>
      <div class="section-body" id="restrict-body">
        <div class="restrict-input-wrap" id="restrict-tags-wrap">
          <input type="text" id="restrict-input" placeholder="输入不吃的食材，按回车添加…">
        </div>
        <div class="quick-restrict" id="quick-restrict"></div>
      </div>
    </div>

  </div><!-- /filter-area -->

  <!-- ===== 推荐按钮 ===== -->
  <div class="cta-wrap">
    <button class="cta-btn" id="recommend-btn" onclick="recommend()">
      🔍 推荐菜谱
    </button>
  </div>

  <!-- 浮动筛选按钮 -->
  <button class="fab-filter" id="fab-filter" onclick="expandFilters()" title="展开筛选">📋</button>

  <!-- ===== 结果区 ===== -->
  <div class="results-area" id="results-area"></div>

  <!-- ===== 自定义菜谱编辑器 ===== -->
  <div class="section recipe-editor" id="recipe-editor">
    <div class="section-header clickable" id="editor-toggle">
      <h2><span>📝</span> 自定义菜谱管理</h2>
      <span style="font-size:11px;color:var(--text-lt);" id="custom-recipe-count">0 个自定义菜谱</span>
    </div>
    <div class="section-body" id="editor-body">
      <p style="font-size:11px;color:var(--text-lt);margin-bottom:10px;">在此添加你的私房菜谱，将与内置菜谱一起参与匹配推荐。</p>
      <div class="editor-row">
        <label>🍳 菜名</label>
        <input type="text" id="cr-name" placeholder="例：土豆烧排骨" maxlength="30">
      </div>
      <div class="editor-row">
        <label>🥬 所需食材（可多选）</label>
        <div class="editor-ing-grid" id="editor-ing-checkboxes"></div>
      </div>
      <div class="editor-row">
        <label>🧂 所需调料（可多选）</label>
        <div class="editor-ing-grid" id="editor-con-checkboxes"></div>
      </div>
      <div class="editor-row">
        <label>⭐ 操作难度</label>
        <div class="diff-picker" id="diff-picker">
          <button class="tag-btn active" data-diff="1">⭐ 简单</button>
          <button class="tag-btn" data-diff="2">⭐⭐ 中等</button>
          <button class="tag-btn" data-diff="3">⭐⭐⭐ 复杂</button>
        </div>
      </div>
      <div class="editor-row">
        <label>⏱ 预计分钟数</label>
        <input type="number" id="cr-time" placeholder="例：30" min="1" max="300" value="20">
      </div>
      <div class="editor-row">
        <label>📝 步骤（每行一步，建议3-5步）</label>
        <textarea id="cr-steps" placeholder="五花肉切块焯水&#10;热锅炒糖色&#10;加调料炖30分钟&#10;大火收汁出锅"></textarea>
      </div>
      <div class="editor-row">
        <label>💡 小贴士（可选）</label>
        <input type="text" id="cr-tip" placeholder="例：冰糖炒糖色更漂亮" maxlength="80">
      </div>
      <div class="editor-actions">
        <button class="btn-primary" onclick="addCustomRecipe()">✅ 添加菜谱</button>
        <button class="btn-outline" onclick="resetEditor()">🔄 清空表单</button>
      </div>
      <div class="custom-recipe-list" id="custom-recipe-list"></div>
    </div>
  </div>

</div>

<!-- ===== 菜谱数据文件（独立维护） ===== -->
<script src="recipes.js"></script>

<script>
// ======================== DATA ========================

/** Ingredient categories */
const INGREDIENT_CATEGORIES = {
  '🥬 蔬菜': ['番茄','南瓜','青菜','土豆','茄子','青椒','白菜','胡萝卜','洋葱','黄瓜','豆角','西兰花','玉米','豆腐'],
  '🥩 肉类': ['鸡蛋','鸡胸肉','五花肉','牛肉','虾仁','排骨'],
  '🍚 主食': ['米饭','面条','粉丝'],
};

/** All condiments */
const ALL_CONDIMENTS = ['盐','糖','生抽','老抽','蚝油','料酒','醋','葱','姜','蒜','淀粉','豆瓣酱','番茄酱','胡椒粉','鸡精','香油','干辣椒'];

/** Substitution dictionary */
const SUBSTITUTES = {
  '蚝油':   { items: ['生抽','糖'],   note: '生抽 + 少许糖 ≈ 蚝油提鲜' },
  '老抽':   { items: ['生抽'],        note: '生抽代替，上色略浅，风味接近' },
  '料酒':   { items: ['姜','醋'],     note: '姜 + 几滴醋可去腥增香' },
  '鸡精':   { items: ['盐','糖'],     note: '盐 + 少许糖可替代提鲜' },
  '淀粉':   { items: [],              note: '可省略勾芡，汤汁收浓即可' },
  '香油':   { items: [],              note: '出锅淋普通食用油也可增香' },
  '豆瓣酱': { items: ['生抽','干辣椒'], note: '生抽 + 辣椒替代，风味相近' },
  '胡椒粉': { items: [],              note: '可省略，不影响主体风味' },
  '番茄酱': { items: ['番茄'],        note: '可用新鲜番茄炒出汁代替' },
};

/** Common dietary restrictions for quick-add */
const COMMON_RESTRICTIONS = ['香菜','内脏','海鲜','辣椒','姜','蒜','胡萝卜','洋葱','肥肉','羊肉'];

// ======================== STATE ========================

/** Selected condiments (Set of strings) — persisted to localStorage */
let selectedCondiments = new Set();

/** Selected ingredients: Map<ingName, { quantity, freshness }> */
let ingredientState = new Map();

/** Dietary restriction tags */
let restrictions = [];

/** Custom ingredients (persisted to localStorage) */
let customIngredients = [];

/** Current editor difficulty */
let editorDifficulty = 1;

/** Whether filters are currently collapsed */
let filtersCollapsed = false;

// ======================== INIT ========================

function init() {
  loadCondiments();
  loadRestrictions();
  loadCustomIngredients();
  renderCondiments();
  renderIngredients();
  renderCustomIngredients();
  renderQuickRestrictions();
  renderRestrictionTags();
  updateIngredientCount();
  renderEditorIngredientCheckboxes();
  renderCustomRecipeList();

  // Condiment section toggle
  document.getElementById('condiment-toggle').addEventListener('click', () => {
    toggleSection('condiment-body', 'condiment-toggle');
  });

  // Ingredient section toggle
  document.getElementById('ingredient-toggle').addEventListener('click', () => {
    toggleSection('ingredient-body', 'ingredient-toggle');
  });

  // Restrict section toggle
  document.getElementById('restrict-toggle').addEventListener('click', () => {
    toggleSection('restrict-body', 'restrict-toggle');
  });

  // Editor section toggle
  document.getElementById('editor-toggle').addEventListener('click', () => {
    toggleSection('editor-body', 'editor-toggle');
  });

  // Restrict input: Enter to add
  document.getElementById('restrict-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addRestriction();
    }
  });

  // Custom ingredient input: Enter to add
  document.getElementById('custom-ing-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addCustomIngredient();
    }
  });

  // Diff picker buttons
  document.querySelectorAll('#diff-picker .tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#diff-picker .tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      editorDifficulty = parseInt(btn.dataset.diff);
    });
  });
}

function toggleSection(bodyId, toggleId) {
  const body = document.getElementById(bodyId);
  const toggle = document.getElementById(toggleId);
  body.classList.toggle('hidden');
  toggle.classList.toggle('collapsed');
}

// ======================== PERSISTENCE ========================

function loadCondiments() {
  try {
    const saved = localStorage.getItem('fridge_condiments');
    if (saved) selectedCondiments = new Set(JSON.parse(saved));
  } catch(e) { /* ignore */ }
}

function saveCondiments() {
  try {
    localStorage.setItem('fridge_condiments', JSON.stringify([...selectedCondiments]));
  } catch(e) { /* ignore */ }
}

function loadRestrictions() {
  try {
    const saved = localStorage.getItem('fridge_restrictions');
    if (saved) restrictions = JSON.parse(saved);
  } catch(e) { /* ignore */ }
}

function saveRestrictions() {
  try {
    localStorage.setItem('fridge_restrictions', JSON.stringify(restrictions));
  } catch(e) { /* ignore */ }
}

function loadCustomIngredients() {
  try {
    const saved = localStorage.getItem('fridge_custom_ingredients');
    if (saved) customIngredients = JSON.parse(saved);
  } catch(e) { /* ignore */ }
}

function saveCustomIngredients() {
  try {
    localStorage.setItem('fridge_custom_ingredients', JSON.stringify(customIngredients));
  } catch(e) { /* ignore */ }
}

function saveCustomRecipes(recipes) {
  try {
    localStorage.setItem('fridge_custom_recipes', JSON.stringify(recipes));
  } catch(e) { /* ignore */ }
}

// ======================== FILTER COLLAPSE ========================

function collapseFilters() {
  if (filtersCollapsed) return;
  filtersCollapsed = true;

  // Collapse all filter sections
  ['condiment-body','ingredient-body','restrict-body'].forEach(id => {
    document.getElementById(id).classList.add('hidden');
  });
  ['condiment-toggle','ingredient-toggle','restrict-toggle'].forEach(id => {
    document.getElementById(id).classList.add('collapsed');
  });

  // Show collapse bar
  const bar = document.getElementById('filter-collapse-bar');
  bar.style.display = 'block';

  // Update summary
  const ingNames = [...ingredientState.keys()];
  const condCount = selectedCondiments.size;
  const summary = document.getElementById('collapse-summary');
  const parts = [];
  if (ingNames.length > 0) parts.push(`已选 ${ingNames.length} 种食材`);
  if (condCount > 0) parts.push(`${condCount} 种调料`);
  if (restrictions.length > 0) parts.push(`${restrictions.length} 项忌口`);
  summary.textContent = parts.length > 0 ? parts.join(' | ') : '未设置筛选条件';

  // Show FAB on mobile
  document.getElementById('fab-filter').classList.add('show');

  // Scroll to results
  setTimeout(() => {
    document.getElementById('results-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function expandFilters() {
  if (!filtersCollapsed) return;
  filtersCollapsed = false;

  // Expand all filter sections
  ['condiment-body','ingredient-body','restrict-body'].forEach(id => {
    document.getElementById(id).classList.remove('hidden');
  });
  ['condiment-toggle','ingredient-toggle','restrict-toggle'].forEach(id => {
    document.getElementById(id).classList.remove('collapsed');
  });

  // Hide collapse bar
  document.getElementById('filter-collapse-bar').style.display = 'none';

  // Hide FAB
  document.getElementById('fab-filter').classList.remove('show');

  // Scroll to filter area
  document.getElementById('filter-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ======================== RENDER ========================

function renderCondiments() {
  const grid = document.getElementById('condiment-grid');
  grid.innerHTML = ALL_CONDIMENTS.map(c => {
    const checked = selectedCondiments.has(c);
    return `
      <label class="condiment-item${checked ? ' checked' : ''}" data-cond="${c}">
        <span class="dot">${checked ? '✓' : ''}</span>
        <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleCondiment('${c}', this.checked)">
        ${c}
      </label>`;
  }).join('');
}

function renderIngredients() {
  const area = document.getElementById('ingredient-area');
  let html = '';
  for (const [cat, items] of Object.entries(INGREDIENT_CATEGORIES)) {
    html += `<div class="cat-label">${cat}</div>`;
    html += `<div class="ingredient-grid">`;
    for (const ing of items) {
      const checked = ingredientState.has(ing);
      html += `
        <label class="ingredient-item${checked ? ' checked' : ''}" data-ing="${ing}">
          <span class="dot">${checked ? '✓' : ''}</span>
          <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleIngredient('${ing}', this.checked)">
          ${ing}
        </label>`;
    }
    html += `</div>`;
  }
  // Custom ingredients category
  if (customIngredients.length > 0) {
    html += `<div class="cat-label" id="custom-cat-label">✨ 自定义食材</div>`;
    html += `<div class="ingredient-grid" id="custom-ing-grid">`;
    html += customIngredients.map(ing => {
      const checked = ingredientState.has(ing);
      return `
        <label class="ingredient-item custom${checked ? ' checked' : ''}" data-ing="${ing}">
          <span class="dot">${checked ? '✓' : ''}</span>
          <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleIngredient('${ing}', this.checked)">
          ${ing}
          <span class="del-btn" onclick="event.stopPropagation(); deleteCustomIngredient('${ing}')">×</span>
        </label>`;
    }).join('');
    html += `</div>`;
  }
  area.innerHTML = html;
}

function renderCustomIngredients() {
  // Just re-render the whole ingredient area
  renderIngredients();
}

function renderStatePanel() {
  const panel = document.getElementById('state-panel');
  const list = document.getElementById('state-list');

  if (ingredientState.size === 0) {
    panel.classList.remove('active');
    return;
  }

  panel.classList.add('active');
  let html = '';
  for (const [ing, state] of ingredientState) {
    html += `
      <div class="state-item">
        <span class="ing-name">${ing}</span>
        <div class="state-group">
          <span class="state-label">剩余量</span>
          ${['少量','适中','充裕'].map(q => `
            <button class="tag-btn${state.quantity === q ? ' active' : ''}"
                    onclick="setQuantity('${ing}', '${q}')">${q}</button>
          `).join('')}
        </div>
        <div class="state-group">
          <span class="state-label">赏味期</span>
          <button class="tag-btn${state.freshness === '新鲜' ? ' active' : ''}"
                  onclick="setFreshness('${ing}', '新鲜')">🟢 新鲜</button>
          <button class="tag-btn wilted${state.freshness === '略蔫' ? ' active' : ''}"
                  onclick="setFreshness('${ing}', '略蔫')">🟠 略蔫</button>
          <button class="tag-btn frozen${state.freshness === '冷冻' ? ' active' : ''}"
                  onclick="setFreshness('${ing}', '冷冻')">🔵 冷冻</button>
        </div>
      </div>`;
  }
  list.innerHTML = html;
}

function renderQuickRestrictions() {
  const el = document.getElementById('quick-restrict');
  el.innerHTML = COMMON_RESTRICTIONS.map(r => {
    const active = restrictions.includes(r);
    return `<button class="tag-btn${active ? ' active' : ''}" style="${active ? 'background:var(--red);color:#fff;border-color:var(--red);' : ''}"
            onclick="toggleQuickRestriction('${r}')">${active ? '✕ ' : ''}${r}</button>`;
  }).join('');
}

function renderRestrictionTags() {
  const wrap = document.getElementById('restrict-tags-wrap');
  const input = document.getElementById('restrict-input');
  wrap.innerHTML = '';
  for (const r of restrictions) {
    const tag = document.createElement('span');
    tag.className = 'restrict-tag';
    tag.innerHTML = `${r}<span class="x" onclick="removeRestriction('${r}')">×</span>`;
    wrap.appendChild(tag);
  }
  wrap.appendChild(input);
  input.value = '';
}

function updateIngredientCount() {
  document.getElementById('ing-count').textContent = `已选 ${ingredientState.size} 种`;
}

// ======================== INGREDIENT ACTIONS ========================

function toggleCondiment(name, checked) {
  if (checked) selectedCondiments.add(name);
  else selectedCondiments.delete(name);
  saveCondiments();
  const label = document.querySelector(`.condiment-item[data-cond="${CSS.escape(name)}"]`);
  if (label) {
    label.classList.toggle('checked', checked);
    label.querySelector('.dot').textContent = checked ? '✓' : '';
  }
}

function toggleIngredient(name, checked) {
  if (checked) {
    ingredientState.set(name, { quantity: '适中', freshness: '新鲜' });
  } else {
    ingredientState.delete(name);
  }
  const label = document.querySelector(`.ingredient-item[data-ing="${CSS.escape(name)}"]`);
  if (label) {
    label.classList.toggle('checked', checked);
    label.querySelector('.dot').textContent = checked ? '✓' : '';
  }
  updateIngredientCount();
  renderStatePanel();
}

function setQuantity(ing, value) {
  const state = ingredientState.get(ing);
  if (state) { state.quantity = value; renderStatePanel(); }
}

function setFreshness(ing, value) {
  const state = ingredientState.get(ing);
  if (state) { state.freshness = value; renderStatePanel(); }
}

// ======================== CUSTOM INGREDIENTS ========================

function addCustomIngredient() {
  const input = document.getElementById('custom-ing-input');
  const val = input.value.trim();
  if (!val) return;
  if (customIngredients.includes(val)) {
    input.value = '';
    input.placeholder = '该食材已存在，请输入新食材…';
    setTimeout(() => { input.placeholder = '+ 添加自定义食材（如腊肠、芝士）'; }, 1500);
    return;
  }
  // Check against preset ingredients
  const allPreset = Object.values(INGREDIENT_CATEGORIES).flat();
  if (allPreset.includes(val)) {
    input.value = '';
    input.placeholder = '该食材已在预设列表中～';
    setTimeout(() => { input.placeholder = '+ 添加自定义食材（如腊肠、芝士）'; }, 1500);
    return;
  }
  customIngredients.push(val);
  saveCustomIngredients();
  renderIngredients();
  renderEditorIngredientCheckboxes();
  input.value = '';
}

function deleteCustomIngredient(ing) {
  if (!confirm(`确定要删除自定义食材「${ing}」吗？`)) return;
  customIngredients = customIngredients.filter(i => i !== ing);
  ingredientState.delete(ing);
  saveCustomIngredients();
  renderIngredients();
  renderEditorIngredientCheckboxes();
  renderStatePanel();
  updateIngredientCount();
}

// ======================== RESTRICTIONS ========================

function addRestriction() {
  const input = document.getElementById('restrict-input');
  const val = input.value.trim();
  if (!val) return;
  if (!restrictions.includes(val)) {
    restrictions.push(val);
    saveRestrictions();
    renderRestrictionTags();
    renderQuickRestrictions();
  }
  input.value = '';
}

function removeRestriction(val) {
  restrictions = restrictions.filter(r => r !== val);
  saveRestrictions();
  renderRestrictionTags();
  renderQuickRestrictions();
}

function toggleQuickRestriction(val) {
  if (restrictions.includes(val)) {
    removeRestriction(val);
  } else {
    restrictions.push(val);
    saveRestrictions();
    renderRestrictionTags();
    renderQuickRestrictions();
  }
}

// ======================== CUSTOM RECIPE EDITOR ========================

function getAllAvailableIngredients() {
  const preset = Object.values(INGREDIENT_CATEGORIES).flat();
  return [...preset, ...customIngredients];
}

function renderEditorIngredientCheckboxes() {
  const ingGrid = document.getElementById('editor-ing-checkboxes');
  const allIng = getAllAvailableIngredients();
  ingGrid.innerHTML = allIng.map(ing =>
    `<label><input type="checkbox" value="${ing}"> ${ing}</label>`
  ).join('');

  const conGrid = document.getElementById('editor-con-checkboxes');
  conGrid.innerHTML = ALL_CONDIMENTS.map(c =>
    `<label><input type="checkbox" value="${c}"> ${c}</label>`
  ).join('');
}

function addCustomRecipe() {
  const name = document.getElementById('cr-name').value.trim();
  const time = parseInt(document.getElementById('cr-time').value) || 20;
  const stepsRaw = document.getElementById('cr-steps').value.trim();
  const tip = document.getElementById('cr-tip').value.trim();

  if (!name) { alert('请输入菜名'); return; }

  // Get selected ingredients
  const ingCheckboxes = document.querySelectorAll('#editor-ing-checkboxes input[type="checkbox"]:checked');
  const ings = [...ingCheckboxes].map(cb => cb.value);
  if (ings.length === 0) { alert('请至少选择一种食材'); return; }

  // Get selected condiments
  const conCheckboxes = document.querySelectorAll('#editor-con-checkboxes input[type="checkbox"]:checked');
  const cons = [...conCheckboxes].map(cb => cb.value);

  // Parse steps
  const steps = stepsRaw.split('\n').map(s => s.trim()).filter(s => s.length > 0);
  if (steps.length < 2) { alert('请至少输入2步烹饪步骤（每行一步）'); return; }

  const recipe = {
    name,
    ing: ings,
    con: cons,
    diff: editorDifficulty,
    time: Math.max(1, Math.min(300, time)),
    steps: steps.slice(0, 7), // max 7 steps
    tip: tip || undefined,
    isCustom: true,
  };

  const customRecipes = loadCustomRecipesLocal();
  customRecipes.push(recipe);
  saveCustomRecipes(customRecipes);
  resetEditor();
  renderCustomRecipeList();
  alert(`✅「${name}」已添加到菜谱库！`);
}

function loadCustomRecipesLocal() {
  try {
    const saved = localStorage.getItem('fridge_custom_recipes');
    return saved ? JSON.parse(saved) : [];
  } catch(e) { return []; }
}

function deleteCustomRecipe(index) {
  const recipes = loadCustomRecipesLocal();
  const name = recipes[index].name;
  if (!confirm(`确定要删除「${name}」吗？`)) return;
  recipes.splice(index, 1);
  saveCustomRecipes(recipes);
  renderCustomRecipeList();
}

function resetEditor() {
  document.getElementById('cr-name').value = '';
  document.getElementById('cr-time').value = '20';
  document.getElementById('cr-steps').value = '';
  document.getElementById('cr-tip').value = '';
  document.querySelectorAll('#editor-ing-checkboxes input[type="checkbox"]').forEach(cb => cb.checked = false);
  document.querySelectorAll('#editor-con-checkboxes input[type="checkbox"]').forEach(cb => cb.checked = false);
  editorDifficulty = 1;
  document.querySelectorAll('#diff-picker .tag-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
}

function renderCustomRecipeList() {
  const list = document.getElementById('custom-recipe-list');
  const recipes = loadCustomRecipesLocal();
  document.getElementById('custom-recipe-count').textContent = `${recipes.length} 个自定义菜谱`;

  if (recipes.length === 0) {
    list.innerHTML = '<p style="font-size:12px;color:var(--text-lt);text-align:center;padding:12px;">暂无自定义菜谱，用上方表单添加吧～</p>';
    return;
  }

  list.innerHTML = recipes.map((r, i) => `
    <div class="custom-recipe-item">
      <div>
        <span class="cr-name">${r.name}</span>
        <span class="cr-meta"> | ${'⭐'.repeat(r.diff)} | ${r.time}分钟 | 食材: ${r.ing.join('、')}</span>
      </div>
      <span class="cr-del" onclick="deleteCustomRecipe(${i})" title="删除">🗑️</span>
    </div>
  `).join('');
}

// ======================== MATCHING ENGINE ========================

function recommend() {
  if (ingredientState.size === 0) {
    document.getElementById('results-area').innerHTML = `
      <div class="empty-state">
        <span class="big-emoji">🛒</span>
        <p>请先勾选冰箱里有的食材吧～</p>
      </div>`;
    expandFilters();
    document.getElementById('results-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }

  const selectedIngredientNames = [...ingredientState.keys()];
  const availCondiments = [...selectedCondiments];
  const allRecipes = getAllRecipes(); // from recipes.js

  const results = [];

  for (const recipe of allRecipes) {
    // --- Filter: dietary restrictions ---
    const hasRestricted = restrictions.some(r => {
      const rl = r.toLowerCase();
      if (recipe.ing.some(i => i.toLowerCase().includes(rl))) return true;
      if (recipe.name.toLowerCase().includes(rl)) return true;
      if (recipe.con.some(c => c.toLowerCase().includes(rl))) return true;
      return false;
    });
    if (hasRestricted) continue;

    // --- Ingredient matching ---
    const recipeIngs = recipe.ing;
    const matched = recipeIngs.filter(i => selectedIngredientNames.includes(i));
    const missingIngs = recipeIngs.filter(i => !selectedIngredientNames.includes(i));

    if (matched.length === 0) continue;
    if (missingIngs.length > 2) continue;

    // --- Condiment matching ---
    const missingConds = recipe.con.filter(c => !availCondiments.includes(c));
    const subMap = {};
    for (const mc of missingConds) {
      if (SUBSTITUTES[mc]) {
        const sub = SUBSTITUTES[mc];
        const hasSub = sub.items.length === 0 || sub.items.every(si => availCondiments.includes(si));
        if (hasSub) subMap[mc] = sub;
      }
    }

    // --- Scoring ---
    const matchRatio = matched.length / recipeIngs.length;
    const matchPct = Math.round(matchRatio * 100);

    const wiltedCount = recipeIngs.filter(i => {
      const st = ingredientState.get(i);
      return st && st.freshness === '略蔫';
    }).length;

    let score = matchRatio * 60;
    score += wiltedCount * 18;
    if (missingConds.length === 0) score += 12;
    else if (Object.keys(subMap).length === missingConds.length) score += 6;
    score += (3 - recipe.diff) * 3;
    if (missingIngs.length === 0) score += 5;

    results.push({
      recipe,
      matched,
      missingIngs,
      missingConds,
      subMap,
      score: Math.round(score * 10) / 10,
      matchPct,
      wiltedCount,
    });
  }

  results.sort((a, b) => b.score - a.score);
  renderResults(results);

  // Auto-collapse filters after showing results
  collapseFilters();
}

// ======================== RENDER RESULTS ========================

function renderResults(results) {
  const area = document.getElementById('results-area');

  if (results.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <span class="big-emoji">😅</span>
        <p>根据现有食材和忌口条件，暂未匹配到合适菜谱</p>
        <p style="font-size:12px;color:var(--text-lt);margin-top:4px;">试试减少忌口项，或补充一些食材～</p>
      </div>`;
    return;
  }

  let html = `<div class="results-header">🍳 为你找到 <strong>${results.length}</strong> 个可选菜谱</div>`;

  results.forEach((r, idx) => {
    const { recipe, matched, missingIngs, missingConds, subMap, matchPct, wiltedCount } = r;
    const isTopPick = idx === 0;

    // Match percentage color
    let pctClass = 'high';
    if (matchPct < 60) pctClass = 'low';
    else if (matchPct <= 80) pctClass = 'mid';

    // Difficulty badge
    let diffBadge = '';
    if (recipe.diff === 1) diffBadge = '<span class="badge badge-diff-1">⭐ 简单</span>';
    else if (recipe.diff === 2) diffBadge = '<span class="badge badge-diff-2">⭐⭐ 中等</span>';
    else diffBadge = '<span class="badge badge-diff-3">⭐⭐⭐ 复杂</span>';

    // Wilted badge
    const wiltedBadge = wiltedCount > 0
      ? `<span class="badge badge-wilted">🔥 消耗${wiltedCount}样略蔫食材</span>`
      : '';

    // Ingredient tags
    let ingTagsHtml = '';
    for (const ing of recipe.ing) {
      if (matched.includes(ing)) {
        const st = ingredientState.get(ing);
        let extra = '';
        if (st && st.freshness === '略蔫') extra = ' 略蔫';
        else if (st && st.freshness === '冷冻') extra = ' 冷冻';
        ingTagsHtml += `<span class="tag-sm match">✅ ${ing}${extra}</span>`;
      } else {
        ingTagsHtml += `<span class="tag-sm miss">❌ 缺 ${ing}</span>`;
      }
    }

    // Condiment tags
    let condHtml = '';
    for (const c of recipe.con) {
      if (!missingConds.includes(c)) {
        condHtml += `<span class="tag-sm match">🧂 ${c}</span>`;
      } else if (subMap[c]) {
        condHtml += `<span class="tag-sm sub-ok">🔄 ${c} → ${subMap[c].note}</span>`;
      } else {
        condHtml += `<span class="tag-sm miss">⚠️ 缺 ${c}</span>`;
      }
    }

    // Missing summary
    let missingSummaryHtml = '';
    const noSubMissing = missingConds.filter(c => !subMap[c]);
    if (missingIngs.length > 0 || noSubMissing.length > 0) {
      missingSummaryHtml = '<div class="missing-summary"><div class="ms-title">📌 缺口汇总</div>';
      if (missingIngs.length > 0) {
        missingSummaryHtml += `<div class="ms-row">🔻 缺少食材：<strong>${missingIngs.join('、')}</strong></div>`;
      }
      if (noSubMissing.length > 0) {
        missingSummaryHtml += `<div class="ms-row">⚠️ 缺少且无平替的调料：<strong>${noSubMissing.join('、')}</strong>（建议采购）</div>`;
      }
      missingSummaryHtml += '</div>';
    }

    // Steps
    const stepsHtml = recipe.steps.map((s, i) => `<li>${i + 1}. ${s}</li>`).join('');

    // Search links
    const encodedName = encodeURIComponent(recipe.name + ' 食谱');
    const encodedNameBili = encodeURIComponent(recipe.name + ' 做法');

    // Custom badge
    const customBadge = recipe.isCustom ? '<span style="font-size:10px;color:var(--blue);font-weight:600;">✨ 自定义</span>' : '';

    html += `
      <div class="recipe-card${isTopPick ? ' top-pick' : ''}">
        <div class="card-header">
          <h3>${isTopPick ? '🏆 ' : ''}${recipe.name} ${customBadge}</h3>
          <span class="match-pct ${pctClass}">📊 ${matchPct}% 匹配</span>
        </div>
        <div class="badges" style="justify-content:flex-start;margin-bottom:8px;">
          ${wiltedBadge}
          <span class="badge badge-time">⏱ ${recipe.time}分钟</span>
          ${diffBadge}
        </div>
        <div class="tags-row">${ingTagsHtml}</div>
        <div style="font-size:11px;color:var(--text-lt);margin-bottom:6px;">所需调料：</div>
        <div class="tags-row">${condHtml}</div>
        ${missingSummaryHtml}
        ${recipe.tip ? `<div style="font-size:11px;color:var(--brown-lt);margin-top:6px;">👨‍🍳 ${recipe.tip}</div>` : ''}
        <ul class="steps-list">${stepsHtml}</ul>
        <div class="search-links">
          <a class="search-link xhs" href="https://www.xiaohongshu.com/search_result?keyword=${encodedName}" target="_blank" rel="noopener">
            📕 小红书搜食谱
          </a>
          <a class="search-link bili" href="https://search.bilibili.com/all?keyword=${encodedNameBili}" target="_blank" rel="noopener">
            📺 B站看视频
          </a>
        </div>
      </div>`;
  });

  area.innerHTML = html;
  area.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ======================== BOOT ========================
init();
</script>
